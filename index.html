<!DOCTYPE html>
<html lang="zh-TW" class="bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>極簡記帳</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            background-color: #000000; 
            color-scheme: dark; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="text-white antialiased h-screen flex flex-col overflow-hidden bg-black">

    <div id="loading-overlay" class="hidden absolute inset-0 bg-black/80 z-[300] flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-b-4 border-blue-500 mb-4"></div>
        <p class="text-white text-lg font-medium tracking-widest animate-pulse">處理中...</p>
    </div>

    <div id="toast" class="hidden absolute top-24 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-full shadow-lg z-[400] transition-opacity duration-300 opacity-0 font-medium whitespace-nowrap text-lg">
        提示訊息
    </div>

    <!-- ================= 登入畫面 ================= -->
    <div id="view-login" class="hidden absolute inset-0 bg-black z-[200] flex flex-col items-center justify-center px-5">
        <div class="w-full max-w-sm bg-[#1C1C1E] p-8 rounded-[2.5rem] border border-zinc-800 shadow-2xl">
            <div class="text-center mb-10 mt-2">
                <div class="w-16 h-16 bg-blue-500 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-[0_0_30px_rgba(59,130,246,0.3)]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight">極簡記帳</h1>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-gray-400 font-medium mb-2 text-lg px-1">帳號</label>
                    <input type="text" id="login-username" placeholder="請輸入帳號" class="w-full bg-black border border-zinc-800 rounded-2xl px-5 py-3.5 text-white text-xl focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-gray-400 font-medium mb-2 text-lg px-1">密碼</label>
                    <input type="password" id="login-password" placeholder="請輸入密碼" class="w-full bg-black border border-zinc-800 rounded-2xl px-5 py-3.5 text-white text-xl focus:outline-none focus:border-blue-500">
                </div>
                <button onclick="handleLogin()" class="w-full mt-8 bg-blue-600 text-white text-xl font-bold py-4 rounded-2xl active-scale">
                    登入
                </button>
            </div>
        </div>
    </div>

    <!-- ================= 主畫面 ================= -->
    <div id="view-home" class="hidden flex flex-col h-full w-full max-md mx-auto relative bg-black">
        <div class="bg-[#1C1C1E] px-4 pt-16 pb-6 z-10 rounded-b-[2rem] border-b border-zinc-800 shadow-md safe-top">
            <div class="flex justify-between items-start mt-2">
                <div class="pl-2">
                    <p class="text-gray-400 text-sm font-medium mb-0.5">目前結餘</p>
                    <h1 id="total-balance" class="text-5xl font-bold tracking-tighter text-white leading-none">$0</h1>
                </div>
                <button onclick="showForm('add')" class="active-scale bg-blue-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-[0_8px_20px_rgba(59,130,246,0.3)] mr-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
            </div>
            <div class="mt-5 flex justify-end px-2">
                <button onclick="showQuery()" class="text-xl text-blue-400 font-bold flex items-center active-scale bg-blue-500/10 px-6 py-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    查詢
                </button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto px-4 py-4 pb-24">
            <h2 class="text-sm text-zinc-500 font-bold mb-4 px-1 uppercase tracking-widest">最近帳目 (最多 20 筆)</h2>
            <div id="transaction-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- ================= 表單畫面 ================= -->
    <div id="view-form" class="hidden absolute inset-0 bg-black z-50 flex flex-col w-full max-w-md mx-auto overflow-hidden">
        <div class="flex justify-between items-center px-4 pt-16 pb-4 border-b border-zinc-800 bg-[#1C1C1E] safe-top">
            <button onclick="hideForm()" class="text-blue-400 text-2xl font-bold px-4 py-2 active-scale">取消</button>
            <h2 id="form-title" class="text-xl font-extrabold text-white">新增帳目</h2>
            <button onclick="saveTransaction()" class="text-blue-400 text-2xl font-black px-4 py-2 active-scale">儲存</button>
        </div>
        <div class="p-5 flex-1 overflow-y-auto bg-black pb-12">
            <input type="hidden" id="form-id">
            <div class="flex bg-[#1C1C1E] p-1.5 rounded-2xl mb-6 border border-zinc-800/50">
                <button id="btn-type-expense" onclick="setFormType('expense')" class="flex-1 py-3 text-lg font-bold rounded-xl bg-[#2C2C2E] text-red-400">支出</button>
                <button id="btn-type-income" onclick="setFormType('income')" class="flex-1 py-3 text-lg font-bold rounded-xl text-gray-400 bg-transparent">收入</button>
            </div>
            <input type="hidden" id="form-type" value="expense">

            <div class="bg-[#1C1C1E] rounded-3xl overflow-hidden mb-8 border border-zinc-800/50 divide-y divide-zinc-800">
                <div class="px-5 py-5 flex items-center">
                    <label class="w-16 flex-shrink-0 text-gray-400 font-bold text-lg">金額</label>
                    <input type="text" id="form-amount" inputmode="numeric" pattern="\d*" placeholder="0" class="flex-1 min-w-0 ml-4 text-right text-3xl font-black focus:outline-none bg-transparent text-white placeholder-zinc-600">
                </div>
                <div class="px-5 py-4 flex items-center">
                    <label class="w-16 flex-shrink-0 text-gray-400 font-bold text-lg">名稱</label>
                    <input type="text" id="form-name" placeholder="例如：午餐" class="flex-1 min-w-0 ml-4 text-right text-xl focus:outline-none bg-transparent text-white">
                </div>
                <div class="px-5 py-4 flex items-center">
                    <label class="w-16 flex-shrink-0 text-gray-400 font-bold text-lg">日期</label>
                    <input type="date" id="form-date" class="flex-1 min-w-0 ml-4 text-right text-xl focus:outline-none bg-transparent text-white">
                </div>
                <div class="px-5 py-4 flex items-center">
                    <label class="w-16 flex-shrink-0 text-gray-400 font-bold text-lg">時間</label>
                    <input type="time" id="form-time" class="flex-1 min-w-0 ml-4 text-right text-xl focus:outline-none bg-transparent text-white">
                </div>
                <div class="px-5 py-4 flex items-center">
                    <label class="w-16 flex-shrink-0 text-gray-400 font-bold text-lg">備註</label>
                    <input type="text" id="form-note" placeholder="選填" class="flex-1 min-w-0 ml-4 text-right text-xl focus:outline-none bg-transparent text-white">
                </div>
            </div>
            <button id="btn-delete" onclick="deleteTransaction()" class="hidden w-full bg-[#1C1C1E] text-red-500 text-lg font-bold py-5 rounded-2xl border border-zinc-800 active-scale mt-2">
                刪除此筆帳目
            </button>
        </div>
    </div>

    <!-- ================= 查詢畫面 ================= -->
    <div id="view-query" class="hidden absolute inset-0 bg-black z-50 flex flex-col w-full max-w-md mx-auto">
        <div class="flex justify-between items-center px-4 pt-16 pb-4 border-b border-zinc-800 bg-[#1C1C1E] safe-top">
            <button onclick="hideQuery()" class="text-blue-400 text-2xl font-bold px-4 py-2 active-scale">返回</button>
            <h2 class="text-xl font-extrabold text-white">查詢</h2>
            <button onclick="handleLogout()" class="text-red-400 text-2xl font-bold px-4 py-2 active-scale">登出</button>
        </div>
        <div class="p-4 bg-black flex-1 flex flex-col overflow-hidden pb-12">
            <div class="bg-[#1C1C1E] p-6 rounded-3xl mb-6 border border-zinc-800/50">
                <div class="flex items-center justify-between mb-5">
                    <span class="text-gray-400 font-bold text-lg">開始</span>
                    <input type="date" id="query-start" class="focus:outline-none bg-zinc-800 text-white text-xl px-4 py-2 rounded-xl">
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-gray-400 font-bold text-lg">結束</span>
                    <input type="date" id="query-end" class="focus:outline-none bg-zinc-800 text-white text-xl px-4 py-2 rounded-xl">
                </div>
                <button onclick="executeQuery()" class="w-full mt-8 bg-blue-600 text-white text-xl font-bold py-4 rounded-2xl active-scale">開始查詢</button>
            </div>
            <div id="query-summary" class="hidden bg-[#1C1C1E] p-4 rounded-3xl mb-6 flex justify-between text-center border border-zinc-800/50">
                <div class="flex-1">
                    <p class="text-xs text-gray-500 mb-1">總收入</p>
                    <p id="query-total-income" class="text-xl font-bold text-green-400">$0</p>
                </div>
                <div class="w-px bg-zinc-800 mx-2"></div>
                <div class="flex-1">
                    <p class="text-xs text-gray-500 mb-1">總支出</p>
                    <p id="query-total-expense" class="text-xl font-bold text-red-400">$0</p>
                </div>
                <div class="w-px bg-zinc-800 mx-2"></div>
                <div class="flex-1">
                    <p class="text-xs text-gray-500 mb-1">結餘</p>
                    <p id="query-net" class="text-xl font-black text-white">$0</p>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto pb-10 px-1">
                <div id="query-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwd7txRiVd5RXwCjhjAPLzAHVs-rVcWWFmQ9KgVNOIm87iJn7jm9Idib2cqldC0ie4g/exec';
        let transactions = [];
        let displayLimit = 20;
        let currentUser = '';

        function showLoading() { document.getElementById('loading-overlay').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.remove('opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 2500);
        }

        async function apiCall(action, payload) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, ...payload }),
                    redirect: 'follow'
                });
                return await response.json();
            } catch (err) {
                console.error('API 錯誤:', err);
                throw new Error('網路連線異常');
            }
        }

        window.onload = () => {
            const savedUser = localStorage.getItem('simple_ledger_user');
            if (savedUser) {
                currentUser = savedUser;
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-home').classList.remove('hidden');
                fetchData(); 
            } else {
                document.getElementById('view-login').classList.remove('hidden');
            }
        };

        async function handleLogin() {
            const user = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-password').value;
            if (!user || !pass) { showToast('請輸入帳號密碼'); return; }
            showLoading(); 
            try {
                const res = await apiCall('verifyLogin', { user, pass });
                if (res.success) {
                    localStorage.setItem('simple_ledger_user', user);
                    currentUser = user;
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-home').classList.remove('hidden');
                    fetchData(); 
                } else {
                    hideLoading();
                    showToast(res.message);
                }
            } catch (err) { hideLoading(); showToast(err.message); }
        }

        function handleLogout() {
            if (confirm('確定要登出？')) {
                localStorage.removeItem('simple_ledger_user');
                location.reload();
            }
        }

        async function fetchData() {
            showLoading();
            try {
                const res = await apiCall('getTransactions', { user: currentUser });
                hideLoading();
                if (res.success) {
                    transactions = res.data; 
                    renderDashboard();
                } else {
                    showToast('讀取失敗：' + res.message);
                }
            } catch (err) { hideLoading(); showToast(err.message); }
        }

        function renderDashboard() {
            let balance = 0;
            transactions.forEach(tx => {
                if (tx.type === 'income') balance += tx.amount;
                if (tx.type === 'expense') balance -= tx.amount;
            });
            document.getElementById('total-balance').innerText = `$${balance.toLocaleString()}`;

            const sortedTx = [...transactions].sort((a, b) => {
                const timeA = new Date(`${a.date.replace(/-/g, '/')} ${a.time}`).getTime() || 0;
                const timeB = new Date(`${b.date.replace(/-/g, '/')} ${b.time}`).getTime() || 0;
                return timeB - timeA;
            });

            const recentTx = sortedTx.slice(0, displayLimit);
            const listEl = document.getElementById('transaction-list');
            listEl.innerHTML = '';
            
            if (recentTx.length === 0) {
                listEl.innerHTML = '<p class="text-center text-zinc-600 mt-12 text-lg">目前尚無帳目</p>';
                return;
            }

            recentTx.forEach(tx => {
                const isExpense = tx.type === 'expense';
                const amountColor = isExpense ? 'text-red-400' : 'text-green-400';
                const sign = isExpense ? '-' : '+';
                const noteHtml = tx.note ? `<div class="text-[10px] text-zinc-500 mt-0.5 truncate max-w-[120px]">📝 ${tx.note}</div>` : '';
                
                const item = document.createElement('div');
                item.className = 'bg-[#1C1C1E] px-4 py-4 rounded-3xl flex justify-between items-center border border-zinc-800/50 active-scale';
                item.innerHTML = `
                    <div class="flex flex-col flex-1 min-w-0 pr-2">
                        <span class="font-bold text-white text-lg truncate">${tx.name}</span>
                        <div class="flex items-center space-x-2 mt-0.5">
                            <span class="text-[10px] text-gray-500 font-medium whitespace-nowrap">${tx.date} ${tx.time}</span>
                            ${noteHtml}
                        </div>
                    </div>
                    <div class="flex items-center space-x-4 flex-shrink-0">
                        <span class="font-black ${amountColor} text-xl tracking-tight">${sign}$${tx.amount.toLocaleString()}</span>
                        <button onclick="showForm('edit', '${tx.id}')" class="text-zinc-400 font-bold px-3 py-2 text-xs bg-zinc-800 rounded-xl">修改</button>
                    </div>
                `;
                listEl.appendChild(item);
            });

            if (sortedTx.length > displayLimit) {
                const moreBtn = document.createElement('button');
                moreBtn.className = 'w-full py-4 mt-4 text-zinc-400 text-base font-bold bg-[#1C1C1E] rounded-3xl border border-zinc-800/50 active-scale';
                moreBtn.innerText = `顯示更多 (還有 ${sortedTx.length - displayLimit} 筆)`;
                moreBtn.onclick = () => {
                    displayLimit += 20;
                    renderDashboard();
                };
                listEl.appendChild(moreBtn);
            }
        }

        function showForm(mode, id = null) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-form').classList.remove('hidden');
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const timeStr = now.toTimeString().split(' ')[0].slice(0,5);

            if (mode === 'add') {
                document.getElementById('form-title').innerText = '新增帳目';
                document.getElementById('form-id').value = '';
                document.getElementById('form-name').value = '';
                document.getElementById('form-amount').value = '';
                document.getElementById('form-date').value = todayStr;
                document.getElementById('form-time').value = timeStr;
                document.getElementById('form-note').value = ''; 
                setFormType('expense');
                document.getElementById('btn-delete').classList.add('hidden');
            } else {
                document.getElementById('form-title').innerText = '修改帳目';
                const tx = transactions.find(t => t.id === id);
                if (tx) {
                    document.getElementById('form-id').value = tx.id;
                    document.getElementById('form-name').value = tx.name;
                    document.getElementById('form-amount').value = tx.amount;
                    document.getElementById('form-date').value = tx.date;
                    document.getElementById('form-time').value = tx.time;
                    document.getElementById('form-note').value = tx.note || '';
                    setFormType(tx.type);
                    document.getElementById('btn-delete').classList.remove('hidden');
                }
            }
        }

        function hideForm() {
            document.getElementById('view-form').classList.add('hidden');
            document.getElementById('view-home').classList.remove('hidden');
        }

        function setFormType(type) {
            document.getElementById('form-type').value = type;
            const btnExp = document.getElementById('btn-type-expense');
            const btnInc = document.getElementById('btn-type-income');
            if (type === 'expense') {
                btnExp.className = 'flex-1 py-3 text-lg font-bold rounded-xl bg-[#2C2C2E] text-red-400 transition-all';
                btnInc.className = 'flex-1 py-3 text-lg font-bold rounded-xl text-gray-400 bg-transparent transition-all';
            } else {
                btnInc.className = 'flex-1 py-3 text-lg font-bold rounded-xl bg-[#2C2C2E] text-green-400 transition-all';
                btnExp.className = 'flex-1 py-3 text-lg font-bold rounded-xl text-gray-400 bg-transparent transition-all';
            }
        }

        async function saveTransaction() {
            const tx = {
                id: document.getElementById('form-id').value,
                type: document.getElementById('form-type').value,
                name: document.getElementById('form-name').value.trim(),
                amount: parseInt(document.getElementById('form-amount').value, 10),
                date: document.getElementById('form-date').value,
                time: document.getElementById('form-time').value,
                note: document.getElementById('form-note').value.trim()
            };
            if (!tx.name || isNaN(tx.amount)) { showToast('請正確輸入內容'); return; }
            showLoading(); 
            try {
                const res = await apiCall('saveTransaction', { user: currentUser, tx });
                if (res.success) { hideForm(); fetchData(); showToast('儲存成功'); }
                else { hideLoading(); showToast(res.message); }
            } catch (err) { hideLoading(); showToast(err.message); }
        }

        async function deleteTransaction() {
            const id = document.getElementById('form-id').value;
            if (confirm('確定要刪除這筆帳目嗎？')) {
                showLoading(); 
                try {
                    const res = await apiCall('deleteTransaction', { user: currentUser, id });
                    if (res.success) { hideForm(); fetchData(); showToast('已刪除'); }
                    else { hideLoading(); showToast(res.message); }
                } catch (err) { hideLoading(); showToast(err.message); }
            }
        }

        function showQuery() {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-query').classList.remove('hidden');
            const now = new Date();
            document.getElementById('query-start').value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            document.getElementById('query-end').value = now.toISOString().split('T')[0];
            document.getElementById('query-summary').classList.add('hidden');
            document.getElementById('query-list').innerHTML = '';
        }

        function hideQuery() {
            document.getElementById('view-query').classList.add('hidden');
            document.getElementById('view-home').classList.remove('hidden');
        }

        function executeQuery() {
            const s = document.getElementById('query-start').value;
            const e = document.getElementById('query-end').value;
            if (!s || !e) return;
            const filtered = transactions.filter(tx => tx.date >= s && tx.date <= e);
            filtered.sort((a,b) => new Date(`${b.date.replace(/-/g, '/')} ${b.time}`).getTime() - new Date(`${a.date.replace(/-/g, '/')} ${a.time}`).getTime());
            
            let inc = 0, exp = 0;
            filtered.forEach(tx => { if(tx.type==='income') inc+=tx.amount; else exp+=tx.amount; });
            
            document.getElementById('query-summary').classList.remove('hidden');
            document.getElementById('query-total-income').innerText = `$${inc.toLocaleString()}`;
            document.getElementById('query-total-expense').innerText = `$${exp.toLocaleString()}`;
            document.getElementById('query-net').innerText = `$${(inc-exp).toLocaleString()}`;
            
            const list = document.getElementById('query-list');
            list.innerHTML = '';
            filtered.forEach(tx => {
                const item = document.createElement('div');
                item.className = 'bg-[#1C1C1E] px-4 py-4 rounded-2xl flex justify-between border border-zinc-800/50 mb-3';
                item.innerHTML = `<div><p class="text-white font-bold text-lg">${tx.name}</p><p class="text-xs text-gray-500">${tx.date}</p></div><p class="${tx.type==='expense'?'text-red-400':'text-green-400'} font-black text-lg">$${tx.amount.toLocaleString()}</p>`;
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
