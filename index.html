<!DOCTYPE html>
<html lang="zh-TW" class="bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>極簡記帳</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            background-color: #000000; 
            color-scheme: dark; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        .active-scale:active { transform: scale(0.96); transition: transform 0.1s; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="text-white antialiased h-screen flex flex-col overflow-hidden bg-black">

    <!-- 載入中遮罩 -->
    <div id="loading-overlay" class="hidden absolute inset-0 bg-black/80 z-[300] flex flex-col items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-b-4 border-blue-500 mb-4"></div>
        <p class="text-white text-lg font-medium tracking-widest animate-pulse">處理中...</p>
    </div>

    <!-- 提示訊息 -->
    <div id="toast" class="hidden absolute top-24 left-1/2 transform -translate-x-1/2 bg-zinc-800 text-white border border-zinc-700 px-6 py-3 rounded-full shadow-[0_4px_20px_rgba(0,0,0,0.5)] z-[400] transition-opacity duration-300 opacity-0 font-medium whitespace-nowrap text-lg text-center">
        提示訊息
    </div>

    <!-- ================= 登入畫面 ================= -->
    <div id="view-login" class="hidden absolute inset-0 bg-black z-[200] flex flex-col items-center justify-center px-5">
        <div class="w-full max-w-sm bg-[#1C1C1E] p-8 rounded-[2.5rem] border border-zinc-800 shadow-2xl">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-blue-500 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-[0_0_30px_rgba(59,130,246,0.3)]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight text-center">極簡記帳</h1>
            </div>
            <div class="space-y-5">
                <input type="text" id="login-username" placeholder="帳號" class="w-full bg-black border border-zinc-800 rounded-2xl px-5 py-3.5 text-white text-xl focus:outline-none focus:border-blue-500">
                <input type="password" id="login-password" placeholder="密碼" class="w-full bg-black border border-zinc-800 rounded-2xl px-5 py-3.5 text-white text-xl focus:outline-none focus:border-blue-500">
                <button onclick="handleLogin()" class="w-full mt-4 bg-blue-600 text-white text-xl font-bold py-4 rounded-2xl active-scale">登入</button>
            </div>
        </div>
    </div>

    <!-- ================= 主畫面 ================= -->
    <div id="view-home" class="hidden flex flex-col h-full w-full max-w-md mx-auto relative bg-black">
        <div class="bg-[#1C1C1E] px-5 pt-16 pb-6 z-10 rounded-b-[2.5rem] border-b border-zinc-800 shadow-md safe-top">
            <!-- 結餘穩固置中 -->
            <div class="text-center mb-6">
                <p class="text-gray-400 text-sm font-medium mb-1 tracking-widest uppercase">目前結餘</p>
                <h1 id="total-balance" class="text-5xl font-black tracking-tighter text-white break-all leading-tight">$0</h1>
            </div>
            <!-- 一小兩大排版：刷新、查詢、新增 -->
            <div class="flex items-center space-x-3">
                <button onclick="manualRefresh()" class="w-16 h-16 bg-zinc-800 text-zinc-300 rounded-2xl flex items-center justify-center active-scale border border-zinc-700/50 flex-shrink-0 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
                <button onclick="showQuery()" class="flex-1 h-16 bg-zinc-800 text-blue-400 text-xl font-bold rounded-2xl flex items-center justify-center active-scale border border-zinc-700/50 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    查詢
                </button>
                <button onclick="showForm('add')" class="flex-1 h-16 bg-blue-600 text-white text-xl font-bold rounded-2xl flex items-center justify-center active-scale shadow-[0_4px_15px_rgba(37,99,235,0.3)]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    新增
                </button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto px-4 py-4 pb-24">
            <h2 class="text-xs text-zinc-500 font-bold mb-4 px-1 uppercase tracking-widest text-left">最近帳目</h2>
            <div id="transaction-list" class="space-y-3"></div>
            <!-- 主畫面加載按鈕 -->
            <button id="btn-load-more" onclick="loadMoreHome()" class="hidden w-full py-5 mt-4 text-zinc-400 text-lg font-bold bg-[#1C1C1E] rounded-3xl border border-zinc-800/50 active-scale text-center">
                顯示更多帳目
            </button>
        </div>
    </div>

    <!-- ================= 表單畫面 (新增/修改) ================= -->
    <div id="view-form" class="hidden absolute inset-0 bg-black z-50 flex flex-col w-full max-w-md mx-auto overflow-hidden">
        <!-- 頂部只留取消與標題 -->
        <div class="flex justify-between items-center px-4 pt-16 pb-4 border-b border-zinc-800 bg-[#1C1C1E] safe-top flex-shrink-0">
            <button onclick="hideForm()" class="text-blue-400 text-2xl font-bold px-4 py-2 active-scale">取消</button>
            <h2 id="form-title" class="text-xl font-extrabold text-white text-center">新增帳目</h2>
            <div class="w-20"></div> <!-- 佔位符保持標題居中 -->
        </div>
        <div class="p-5 flex-1 overflow-y-auto bg-black pb-12 text-left">
            <input type="hidden" id="form-id">
            <div class="flex bg-[#1C1C1E] p-1.5 rounded-2xl mb-6 border border-zinc-800/50">
                <button id="btn-type-expense" onclick="setFormType('expense')" class="flex-1 py-3 text-lg font-bold rounded-xl bg-[#2C2C2E] text-red-400">支出</button>
                <button id="btn-type-income" onclick="setFormType('income')" class="flex-1 py-3 text-lg font-bold rounded-xl text-gray-400 bg-transparent">收入</button>
            </div>
            <input type="hidden" id="form-type" value="expense">

            <div class="bg-[#1C1C1E] rounded-3xl overflow-hidden mb-8 border border-zinc-800/50 divide-y divide-zinc-800">
                <div class="px-5 py-5 flex items-center">
                    <label class="w-16 flex-shrink-0 text-gray-400 font-bold text-lg text-left">金額</label>
                    <input type="text" id="form-amount" inputmode="numeric" pattern="\d*" placeholder="0" class="flex-1 min-w-0 ml-4 text-right text-3xl font-black focus:outline-none bg-transparent text-white">
                </div>
                <div class="px-5 py-4 flex items-center">
                    <label class="w-16 flex-shrink-0 text-gray-400 font-bold text-lg text-left">名稱</label>
                    <input type="text" id="form-name" placeholder="例如：午餐" class="flex-1 min-w-0 ml-4 text-right text-xl focus:outline-none bg-transparent text-white">
                </div>
                <div class="px-5 py-4 flex items-center">
                    <label class="w-16 flex-shrink-0 text-gray-400 font-bold text-lg text-left">日期</label>
                    <input type="date" id="form-date" class="flex-1 min-w-0 ml-4 text-right text-xl focus:outline-none bg-transparent text-white">
                </div>
                <div class="px-5 py-4 flex items-center">
                    <label class="w-16 flex-shrink-0 text-gray-400 font-bold text-lg text-left">時間</label>
                    <input type="time" id="form-time" class="flex-1 min-w-0 ml-4 text-right text-xl focus:outline-none bg-transparent text-white">
                </div>
                <div class="px-5 py-4 flex items-center">
                    <label class="w-16 flex-shrink-0 text-gray-400 font-bold text-lg text-left">備註</label>
                    <input type="text" id="form-note" placeholder="選填" class="flex-1 min-w-0 ml-4 text-right text-xl focus:outline-none bg-transparent text-white">
                </div>
            </div>

            <!-- 儲存與刪除移至最下方，大拇指友善 -->
            <div class="space-y-4 px-2">
                <button onclick="saveTransaction()" class="w-full bg-blue-600 text-white text-2xl font-black py-5 rounded-2xl active-scale shadow-lg">儲存帳目</button>
                <button id="btn-delete" onclick="deleteTransaction()" class="hidden w-full text-red-500 text-xl font-bold py-4 rounded-2xl active-scale opacity-80 text-center border border-red-500/20">刪除此筆帳目</button>
            </div>
        </div>
    </div>

    <!-- ================= 查詢畫面 ================= -->
    <div id="view-query" class="hidden absolute inset-0 bg-black z-50 flex flex-col w-full max-w-md mx-auto overflow-hidden text-left">
        <!-- 僅固定頂部導覽列 -->
        <div class="flex justify-between items-center px-4 pt-16 pb-4 border-b border-zinc-800 bg-[#1C1C1E] safe-top flex-shrink-0 z-20">
            <button onclick="hideQuery()" class="text-blue-400 text-2xl font-bold px-4 py-2 active-scale">返回</button>
            <h2 class="text-xl font-extrabold text-white text-center">查詢明細</h2>
            <button onclick="handleLogout()" class="text-red-400 text-2xl font-bold px-4 py-2 active-scale text-right">登出</button>
        </div>
        
        <div class="flex-1 overflow-y-auto px-3 pt-4 pb-24">
            <!-- 篩選區 (隨滾動捲走) -->
            <div class="mb-5 bg-[#1C1C1E]/50 p-4 rounded-2xl border border-zinc-800/30">
                <!-- 快捷日期選擇列 (< 週 月 >) -->
                <div class="flex items-center justify-center space-x-3 mb-4 border-b border-zinc-800/50 pb-4">
                    <button onclick="shiftDate(-1)" class="w-10 h-10 rounded-xl bg-zinc-800 text-zinc-300 flex items-center justify-center border border-zinc-700/50 active-scale shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <button onclick="setQuickDate('week')" id="btn-quick-week" class="px-5 py-2 rounded-xl bg-zinc-800 text-zinc-400 text-base font-bold border border-zinc-700/50 active-scale transition-colors shadow-sm">週</button>
                    <button onclick="setQuickDate('month')" id="btn-quick-month" class="px-5 py-2 rounded-xl bg-blue-600/20 text-blue-400 text-base font-bold border border-blue-500/30 active-scale transition-colors shadow-sm">月</button>
                    <button onclick="shiftDate(1)" class="w-10 h-10 rounded-xl bg-zinc-800 text-zinc-300 flex items-center justify-center border border-zinc-700/50 active-scale shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                    </button>
                </div>

                <div class="flex items-center space-x-2 mb-4">
                    <input type="date" id="query-start" class="flex-1 bg-zinc-800 text-white text-base px-3 py-3 rounded-xl outline-none border border-zinc-700/50">
                    <span class="text-zinc-600 font-black">~</span>
                    <input type="date" id="query-end" class="flex-1 bg-zinc-800 text-white text-base px-3 py-3 rounded-xl outline-none border border-zinc-700/50">
                </div>
                <button onclick="startQuery()" class="w-full bg-blue-600 text-white text-lg font-bold py-4 rounded-2xl active-scale shadow-sm">開始查詢</button>
            </div>

            <!-- 總計區 (垂直三行，字體大小 text-2xl) -->
            <div id="query-summary" class="hidden mb-6 bg-[#1C1C1E] p-6 rounded-[2rem] border border-zinc-800/50 space-y-4">
                <div class="flex justify-between items-center px-2">
                    <span class="text-zinc-400 text-base font-bold text-left">總收入</span>
                    <span id="query-total-income" class="text-2xl font-black text-green-400 text-right">$0</span>
                </div>
                <div class="flex justify-between items-center px-2">
                    <span class="text-zinc-400 text-base font-bold text-left">總支出</span>
                    <span id="query-total-expense" class="text-2xl font-black text-red-400 text-right">$0</span>
                </div>
                <div class="h-px bg-zinc-800/50 mx-2"></div>
                <div class="flex justify-between items-center px-2 pt-1">
                    <span class="text-zinc-300 text-lg font-black uppercase tracking-widest text-left">本期結餘</span>
                    <span id="query-net" class="text-2xl font-black text-white text-right">$0</span>
                </div>
            </div>

            <div id="query-list" class="space-y-3"></div>
            <!-- 查詢結果加載按鈕 (真分頁) -->
            <button id="btn-query-load-more" onclick="loadMoreQuery()" class="hidden w-full py-5 mt-4 text-zinc-400 text-lg font-bold bg-[#1C1C1E] rounded-3xl border border-zinc-800/50 active-scale text-center">
                顯示更多查詢結果
            </button>
        </div>
    </div>

    <!-- ================= JavaScript ================= -->
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwd7txRiVd5RXwCjhjAPLzAHVs-rVcWWFmQ9KgVNOIm87iJn7jm9Idib2cqldC0ie4g/exec';
        let currentUser = '';
        
        // 分頁與快取控制
        let homeOffset = 0;
        let queryOffset = 0;
        const PAGE_SIZE = 20;
        let txCache = {}; // 存放所有讀取過的帳目，提升表單開啟速度

        // 髒標記：控制從查詢返回主畫面時，是否需要自動重新整理
        let isDataDirty = false; 

        function showLoading() { document.getElementById('loading-overlay').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.remove('opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 2500);
        }

        async function apiCall(action, payload) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: action, ...payload }),
                    redirect: 'follow'
                });
                return await response.json();
            } catch (err) {
                console.error('API 錯誤:', err);
                throw new Error('網路連線異常，請檢查網路狀態');
            }
        }

        window.onload = () => {
            const savedUser = localStorage.getItem('simple_ledger_user');
            if (savedUser) {
                currentUser = savedUser;
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-home').classList.remove('hidden');
                refreshHome(); 
            } else {
                document.getElementById('view-login').classList.remove('hidden');
            }
        };

        async function handleLogin() {
            const user = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-password').value;
            if (!user || !pass) { showToast('請輸入帳號密碼'); return; }
            showLoading(); 
            try {
                const res = await apiCall('verifyLogin', { user: user, pass: pass });
                if (res.success) {
                    localStorage.setItem('simple_ledger_user', user);
                    currentUser = user;
                    document.getElementById('login-username').value = '';
                    document.getElementById('login-password').value = '';
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-home').classList.remove('hidden');
                    refreshHome(); 
                } else {
                    hideLoading();
                    showToast(res.message);
                }
            } catch (err) { hideLoading(); showToast('登入異常'); }
        }

        function handleLogout() {
            if (confirm('確定要登出嗎？')) {
                localStorage.removeItem('simple_ledger_user');
                location.reload();
            }
        }

        // ================= 主畫面資料載入 =================

        // 手動刷新 (提供回饋感)
        function manualRefresh() {
            showToast('同步最新資料中...');
            refreshHome();
        }

        async function refreshHome() {
            showLoading();
            homeOffset = 0;
            document.getElementById('transaction-list').innerHTML = '';
            try {
                const [summary, txs] = await Promise.all([
                    apiCall('getSummary', { user: currentUser }),
                    apiCall('getTransactions', { user: currentUser, limit: PAGE_SIZE, offset: 0 })
                ]);
                hideLoading();
                if (summary.success) document.getElementById('total-balance').innerText = `$${summary.balance.toLocaleString()}`;
                if (txs.success) renderHomeItems(txs.data, txs.hasMore);
                isDataDirty = false; // 已經是最新的了，洗白髒標記
            } catch (err) { hideLoading(); showToast('載入異常'); }
        }

        async function loadMoreHome() {
            showLoading();
            homeOffset += PAGE_SIZE;
            try {
                const res = await apiCall('getTransactions', { user: currentUser, limit: PAGE_SIZE, offset: homeOffset });
                hideLoading();
                if (res.success) renderHomeItems(res.data, res.hasMore, true);
            } catch (err) { hideLoading(); showToast('加載失敗'); }
        }

        function renderHomeItems(items, hasMore, append = false) {
            const listEl = document.getElementById('transaction-list');
            if (!append) listEl.innerHTML = '';
            
            if (items.length === 0 && !append) {
                listEl.innerHTML = '<p class="text-center text-zinc-600 mt-12 text-lg">目前尚無帳目</p>';
            } else {
                items.forEach(tx => {
                    txCache[tx.id] = tx; // 存入快取
                    listEl.appendChild(createItemEl(tx));
                });
            }

            const moreBtn = document.getElementById('btn-load-more');
            if (hasMore) moreBtn.classList.remove('hidden');
            else moreBtn.classList.add('hidden');
        }

        // ================= 查詢資料載入與快捷日期 =================
        
        let currentQueryMode = 'month'; // 用來記錄目前是週還是月，預設本月

        // 設定快捷日期
        function setQuickDate(mode, referenceDate = new Date()) {
            currentQueryMode = mode;
            const startInput = document.getElementById('query-start');
            const endInput = document.getElementById('query-end');
            
            let start, end;
            if (mode === 'week') {
                // 週一至週日邏輯
                const d = new Date(referenceDate);
                const day = d.getDay();
                // 如果是週日(0)，往前推6天；否則往前推 (day - 1) 天
                const diffToMonday = d.getDate() - day + (day === 0 ? -6 : 1);
                start = new Date(d.setDate(diffToMonday));
                end = new Date(start.getTime());
                end.setDate(start.getDate() + 6);
            } else {
                // 本月邏輯
                const d = new Date(referenceDate);
                start = new Date(d.getFullYear(), d.getMonth(), 1);
                end = new Date(d.getFullYear(), d.getMonth() + 1, 0); // 下個月第0天 = 這個月最後一天
            }

            // 格式化為 YYYY-MM-DD
            const format = (dt) => {
                const y = dt.getFullYear();
                const m = String(dt.getMonth() + 1).padStart(2, '0');
                const day = String(dt.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            };

            startInput.value = format(start);
            endInput.value = format(end);

            // 更新 UI 膠囊按鈕狀態
            const btnWeek = document.getElementById('btn-quick-week');
            const btnMonth = document.getElementById('btn-quick-month');
            const activeClass = 'px-5 py-2 rounded-xl bg-blue-600/20 text-blue-400 text-base font-bold border border-blue-500/30 active-scale transition-colors shadow-sm';
            const inactiveClass = 'px-5 py-2 rounded-xl bg-zinc-800 text-zinc-400 text-base font-bold border border-zinc-700/50 active-scale transition-colors shadow-sm';
            
            if (mode === 'week') {
                btnWeek.className = activeClass;
                btnMonth.className = inactiveClass;
            } else {
                btnMonth.className = activeClass;
                btnWeek.className = inactiveClass;
            }
        }

        // 平移日期 (上一個/下一個)
        function shiftDate(direction) {
            const startInput = document.getElementById('query-start').value;
            if (!startInput) return;
            
            // 將 '-' 替換為 '/' 確保 iOS Safari 正確解析日期
            const currentStart = new Date(startInput.replace(/-/g, '/'));
            
            if (currentQueryMode === 'week') {
                currentStart.setDate(currentStart.getDate() + (direction * 7));
                setQuickDate('week', currentStart);
            } else {
                currentStart.setMonth(currentStart.getMonth() + direction);
                setQuickDate('month', currentStart);
            }
        }

        async function startQuery() {
            const s = document.getElementById('query-start').value;
            const e = document.getElementById('query-end').value;
            if (!s || !e) { showToast('請選擇完整的日期區間'); return; }
            showLoading();
            queryOffset = 0;
            document.getElementById('query-list').innerHTML = '';
            try {
                const [summary, txs] = await Promise.all([
                    apiCall('getSummary', { user: currentUser, startDate: s, endDate: e }),
                    apiCall('getTransactions', { user: currentUser, limit: PAGE_SIZE, offset: 0, startDate: s, endDate: e })
                ]);
                hideLoading();
                if (summary.success) {
                    document.getElementById('query-summary').classList.remove('hidden');
                    document.getElementById('query-total-income').innerText = `$${summary.income.toLocaleString()}`;
                    document.getElementById('query-total-expense').innerText = `$${summary.expense.toLocaleString()}`;
                    document.getElementById('query-net').innerText = `$${summary.balance.toLocaleString()}`;
                }
                if (txs.success) renderQueryItems(txs.data, txs.hasMore);
            } catch (err) { hideLoading(); showToast('查詢異常'); }
        }

        async function loadMoreQuery() {
            const s = document.getElementById('query-start').value;
            const e = document.getElementById('query-end').value;
            showLoading();
            queryOffset += PAGE_SIZE;
            try {
                const res = await apiCall('getTransactions', { user: currentUser, limit: PAGE_SIZE, offset: queryOffset, startDate: s, endDate: e });
                hideLoading();
                if (res.success) renderQueryItems(res.data, res.hasMore, true);
            } catch (err) { hideLoading(); showToast('加載失敗'); }
        }

        function renderQueryItems(items, hasMore, append = false) {
            const listEl = document.getElementById('query-list');
            if (!append) listEl.innerHTML = '';
            if (items.length === 0 && !append) {
                listEl.innerHTML = '<p class="text-center text-zinc-600 mt-12 text-lg">此期間無帳目資料</p>';
            } else {
                items.forEach(tx => {
                    txCache[tx.id] = tx; // 存入快取
                    listEl.appendChild(createItemEl(tx));
                });
            }
            const moreBtn = document.getElementById('btn-query-load-more');
            if (hasMore) moreBtn.classList.remove('hidden');
            else moreBtn.classList.add('hidden');
        }

        // ================= UI 組件生成 =================

        function createItemEl(tx) {
            const isExpense = tx.type === 'expense';
            const amountColor = isExpense ? 'text-red-400' : 'text-green-400';
            const sign = isExpense ? '-' : '+';
            const noteHtml = tx.note ? `<div class="w-full text-sm text-zinc-500 mt-1.5 border-t border-zinc-800/10 pt-0.5 text-left truncate">📝 ${tx.note}</div>` : '';
            
            // 將整個 tx 物件轉為 JSON 字串，並處理引號避免 HTML 解析錯誤
            const txJson = JSON.stringify(tx).replace(/"/g, '&quot;');
            
            const item = document.createElement('div');
            item.className = 'bg-[#1C1C1E] px-4 py-3 rounded-[1.5rem] border border-zinc-800/50 flex flex-col active-scale relative overflow-hidden';
            item.innerHTML = `
                <div class="w-full text-sm text-gray-500 font-bold mb-0.5 text-left opacity-80">${tx.date} ${tx.time}</div>
                <div class="w-full flex items-center">
                    <div class="flex-1 min-w-0 text-left">
                        <span class="font-bold text-white text-2xl truncate block">${tx.name}</span>
                    </div>
                    <div class="flex items-center space-x-4 flex-shrink-0 ml-4">
                        <span class="font-black ${amountColor} text-2xl tracking-tighter">${sign}$${tx.amount.toLocaleString()}</span>
                        <button onclick="showForm('edit', '${tx.id}')" class="w-10 h-10 bg-zinc-800/70 rounded-2xl flex items-center justify-center text-zinc-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                            </svg>
                        </button>
                    </div>
                </div>
                ${noteHtml}
            `;
            return item;
        }

        // ================= 表單互動 =================

        function showForm(mode, id = null) {
            // 追蹤發起修改的視窗
            window._last_view = !document.getElementById('view-query').classList.contains('hidden') ? 'query' : 'home';
            
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-query').classList.add('hidden');
            document.getElementById('view-form').classList.remove('hidden');
            
            const now = new Date();
            if (mode === 'add') {
                document.getElementById('form-title').innerText = '新增帳目';
                document.getElementById('form-id').value = '';
                document.getElementById('form-name').value = '';
                document.getElementById('form-amount').value = '';
                document.getElementById('form-date').value = now.toISOString().split('T')[0];
                document.getElementById('form-time').value = now.toTimeString().split(' ')[0].slice(0,5);
                document.getElementById('form-note').value = ''; 
                setFormType('expense');
                document.getElementById('btn-delete').classList.add('hidden');
            } else {
                document.getElementById('form-title').innerText = '修改帳目';
                const txData = txCache[id]; // 從快取讀取，安全且快速
                
                if (txData) {
                    document.getElementById('form-id').value = id;
                    document.getElementById('form-name').value = txData.name;
                    document.getElementById('form-amount').value = txData.amount;
                    document.getElementById('form-date').value = txData.date;
                    
                    // 時間自動格式化防呆
                    let rawTime = txData.time || "";
                    let h = "00", m = "00";
                    let match = rawTime.match(/(\d{1,2}):(\d{1,2})/);
                    if (match) {
                        h = match[1].padStart(2, '0');
                        m = match[2].padStart(2, '0');
                        if (rawTime.includes('下午') && parseInt(h) < 12) h = (parseInt(h) + 12).toString();
                        if (rawTime.includes('上午') && parseInt(h) === 12) h = "00";
                    }
                    document.getElementById('form-time').value = `${h}:${m}`;
                    document.getElementById('form-note').value = txData.note || '';
                    setFormType(txData.type);
                    document.getElementById('btn-delete').classList.remove('hidden');
                }
            }
        }

        function hideForm() {
            document.getElementById('view-form').classList.add('hidden');
            if (window._last_view === 'query') document.getElementById('view-query').classList.remove('hidden');
            else document.getElementById('view-home').classList.remove('hidden');
        }

        function setFormType(type) {
            document.getElementById('form-type').value = type;
            const btnExp = document.getElementById('btn-type-expense');
            const btnInc = document.getElementById('btn-type-income');
            if (type === 'expense') {
                btnExp.className = 'flex-1 py-3 text-lg font-bold rounded-xl bg-[#2C2C2E] text-red-400';
                btnInc.className = 'flex-1 py-3 text-lg font-bold rounded-xl text-gray-400 bg-transparent';
            } else {
                btnInc.className = 'flex-1 py-3 text-lg font-bold rounded-xl bg-[#2C2C2E] text-green-400';
                btnExp.className = 'flex-1 py-3 text-lg font-bold rounded-xl text-gray-400 bg-transparent';
            }
        }

        async function saveTransaction() {
            const tx = {
                id: document.getElementById('form-id').value,
                type: document.getElementById('form-type').value,
                name: document.getElementById('form-name').value.trim(),
                amount: parseInt(document.getElementById('form-amount').value, 10),
                date: document.getElementById('form-date').value,
                time: document.getElementById('form-time').value,
                note: document.getElementById('form-note').value.trim()
            };
            if (!tx.name || isNaN(tx.amount)) { showToast('請填寫完整名稱與金額'); return; }
            showLoading(); 
            try {
                const res = await apiCall('saveTransaction', { user: currentUser, tx: tx });
                if (res.success) { 
                    isDataDirty = true; // 觸發髒標記
                    hideForm(); 
                    if (window._last_view === 'query') startQuery(); 
                    else refreshHome(); 
                    showToast('儲存成功'); 
                } else { hideLoading(); showToast(res.message); }
            } catch (err) { hideLoading(); showToast('儲存失敗，請檢查網路'); }
        }

        async function deleteTransaction() {
            const id = document.getElementById('form-id').value;
            if (confirm('確定要刪除這筆帳目嗎？')) {
                showLoading(); 
                try {
                    const res = await apiCall('deleteTransaction', { user: currentUser, id: id });
                    if (res.success) { 
                        isDataDirty = true; // 觸發髒標記
                        hideForm(); 
                        if (window._last_view === 'query') startQuery(); 
                        else refreshHome(); 
                        showToast('已刪除'); 
                    } else { hideLoading(); showToast(res.message); }
                } catch (err) { hideLoading(); showToast('刪除失敗'); }
            }
        }

        function showQuery() {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-query').classList.remove('hidden');
            
            // 只有當尚未設定日期時，才自動代入預設值（本月）並亮起對應按鈕
            if (!document.getElementById('query-start').value) {
                setQuickDate('month');
            }
        }

        // 查詢退回主畫面時的智慧防呆
        function hideQuery() {
            document.getElementById('view-query').classList.add('hidden');
            document.getElementById('view-home').classList.remove('hidden');
            
            // 只有當資料在查詢頁面被更動過，才觸發背景重新整理
            if (isDataDirty) {
                refreshHome();
            }
        }
    </script>
</body>
</html>
